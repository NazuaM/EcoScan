name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'recycling_app/**'
      - '.github/workflows/flutter-apk.yml'
  pull_request:
    paths:
      - 'recycling_app/**'
      - '.github/workflows/flutter-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: recycling_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=UPCYCLER_IMAGE_WORKER_URL=${{ secrets.UPCYCLER_IMAGE_WORKER_URL }} \
            --dart-define=UPCYCLER_IMAGE_WORKER_TOKEN=${{ secrets.UPCYCLER_IMAGE_WORKER_TOKEN }}

      - name: Extract APK certificate fingerprint
        run: |
          keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk | tee apk-cert.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: recycling_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK certificate info
        uses: actions/upload-artifact@v4
        with:
          name: app-release-cert-info
          path: recycling_app/apk-cert.txt
